<!DOCTYPE html>
<html>
<head>
    <title>Server Load Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        .gauge-container { width: 400px; height: 200px; position: relative; overflow: hidden; margin-top: 50px; }
        .gauge { width: 400px; height: 400px; border-radius: 50%; border: 40px solid #333; box-sizing: border-box; position: absolute; }
        .gauge-progress { 
            width: 400px; height: 400px; border-radius: 50%; border: 40px solid green; 
            box-sizing: border-box; position: absolute; clip-path: inset(0 0 50% 0);
            transform: rotate(0deg); transition: transform 0.5s, border-color 0.5s;
        }
        #status-text { font-size: 24px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Server Stress Monitor</h1>
    <div class="gauge-container">
        <div class="gauge"></div>
        <div id="progress" class="gauge-progress"></div>
    </div>
    <div id="status-text">Requests: 0/s</div>

    <script>
        const socket = io();
        const progress = document.getElementById('progress');
        const statusText = document.getElementById('status-text');
        const maxCapacity = 200; // Juster denne værdi efter behov

        socket.on('update_load', (count) => {
            let percentage = Math.min((count / maxCapacity) * 180, 180);
            progress.style.transform = `rotate(${percentage}deg)`;
            statusText.innerText = `Requests: ${count}/s`;

            // Farveskift
            if (count > maxCapacity * 0.8) {
                progress.style.borderColor = 'red';
            } else if (count > maxCapacity * 0.5) {
                progress.style.borderColor = 'yellow';
            } else {
                progress.style.borderColor = 'green';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Cyber Range - Server Load Monitor</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #0a0a0a; 
            color: #00ff00; 
            margin-top: 50px;
        }

        /* Container til barometeret */
        .gauge-wrapper {
            position: relative;
            width: 400px;
            height: 200px;
            overflow: hidden;
        }

        /* Selve buen med farve-graduering */
        .gauge-arc {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            /* Graduering fra grøn til gul til rød */
            background: conic-gradient(
                from 270deg, 
                #00ff00 0%, 
                #ffff00 25%, 
                #ff0000 50%, 
                transparent 50%
            );
            transform: rotate(-90deg);
        }

        /* Hullet i midten for at lave det til en bue */
        .gauge-center {
            position: absolute;
            top: 40px;
            left: 40px;
            width: 320px;
            height: 320px;
            background: #0a0a0a;
            border-radius: 50%;
            z-index: 1;
        }

        /* Nålen/Pilen */
        .needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 180px;
            background: white;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 0.2s ease-out;
            z-index: 2;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Pilespids */
        .needle::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -8px;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid white;
        }

        #status-text { 
            font-size: 2rem; 
            margin-top: 30px; 
            text-shadow: 0 0 10px #00ff00;
        }

        .info {
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>SERVER STRESS MONITOR</h1>
    
    <div class="gauge-wrapper">
        <div class="gauge-arc"></div>
        <div class="gauge-center"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div id="status-text">Requests: 0/s</div>
    <div class="info">Target IP: 192.168.1.107</div>

    <script>
        // Forbind til din Kali-maskine (Port 3000)
        const socket = io('http://192.168.1.107:3000');
        
        const needle = document.getElementById('needle');
        const statusText = document.getElementById('status-text');
        
        const maxCapacity = 250; // Det antal requests der sender nålen helt i rød

        // Denne funktion kører hver gang serveren sender en 'update_load' pakke
        socket.on('update_load', (count) => {
            // Udregn rotation (fra -90 grader til +90 grader)
            let loadFactor = Math.min(count / maxCapacity, 1);
            let rotation = (loadFactor * 180) - 90;

            // Opdater nålens position
            needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            
            // Opdater tekst
            statusText.innerText = `Requests: ${count}/s`;

            // Visuel advarsel hvis serveren er presset
            if (count >= maxCapacity) {
                statusText.style.color = "red";
                statusText.innerText = "CRITICAL LOAD - SERVER DOWN";
            } else {
                statusText.style.color = "#00ff00";
            }
        });
    </script>
</body>
</html>

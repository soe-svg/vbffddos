<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Cyber Range - Real-time Load</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; flex-direction: column; align-items: center; 
            background: #0d0d0d; color: #00ff00; margin-top: 50px;
        }

        .gauge-wrapper {
            position: relative; width: 400px; height: 200px; overflow: hidden;
        }

        .gauge-arc {
            width: 400px; height: 400px; border-radius: 50%;
            background: conic-gradient(from 270deg, #00ff00 0%, #ffff00 25%, #ff0000 50%, transparent 50%);
            transform: rotate(-90deg);
        }

        .gauge-center {
            position: absolute; top: 40px; left: 40px; width: 320px; height: 320px;
            background: #0d0d0d; border-radius: 50%; z-index: 1;
        }

        .needle {
            position: absolute; bottom: 0; left: 50%; width: 4px; height: 180px;
            background: #ffffff; transform-origin: bottom center;
            transform: translateX(-50%) rotate(-90deg);
            transition: transform 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            z-index: 2;
        }

        .needle::before {
            content: ''; position: absolute; top: -10px; left: -8px;
            border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 20px solid #ffffff;
        }

        #status-text { font-size: 2.5rem; margin-top: 30px; font-weight: bold; }
        .label { color: #888; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>NETWORK TRAFFIC MONITOR</h1>
    
    <div class="gauge-wrapper">
        <div class="gauge-arc"></div>
        <div class="gauge-center"></div>
        <div id="needle" class="needle"></div>
    </div>

    <div id="status-text">0 RPS</div>
    <div class="label">Requests Per Second</div>

    <script>
        // Husk at rette IP'en til din Kali-IP hvis nødvendigt
        const socket = io('http://192.168.1.107:3000');
        const needle = document.getElementById('needle');
        const statusText = document.getElementById('status-text');
        
        // Hvor mange samlede requests pr. sekund skal til for at ramme rød?
        const maxCapacity = 500; 

        socket.on('update_load', (rps) => {
            // Beregn rotation mellem -90 og 90 grader
            let loadFactor = Math.min(rps / maxCapacity, 1);
            let rotation = (loadFactor * 180) - 90;

            needle.style.transform = `translateX(-50%) rotate(${rotation}deg)`;
            statusText.innerText = `${rps} RPS`;

            // Farvefeedback på teksten
            if (loadFactor > 0.8) {
                statusText.style.color = "#ff0000";
            } else if (loadFactor > 0.4) {
                statusText.style.color = "#ffff00";
            } else {
                statusText.style.color = "#00ff00";
            }
        });
    </script>
</body>
</html>
